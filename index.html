<!DOCTYPE html>
<html>
<head>
    <title>Aptech Site</title>
    <style>
        body { margin: 0; padding: 0; }
        
        /* THE BANNER */
        .banner {
            width: 100%;
            height: 200px;
            background-color: #f0f0f0;
            text-align: center;
        }

        .banner img {
            height: 200px;
            width: auto;
        }

        /* THE LOWER PART */
        .main {
            display: flex;
            height: 500px;
        }

        .menu {
            width: 200px;
            background-color: #2c3e50;
            padding: 20px;
        }

        .menu a {
            display: block;
            color: white;
            margin-bottom: 10px;
            text-decoration: none;
        }

        .content {
            flex: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="banner">
        <img src="aptech_logo.png" alt="IF YOU SEE THIS TEXT THE IMAGE IS HIDDEN">
    </div>

    <div class="main">
        <div class="menu">
            <a href="home.html" target="my_frame">Home</a>
            <a href="about.html" target="my_frame">About Us</a>
            <a href="contact.html" target="my_frame">Contact</a>
        </div>

        <div class="content">
            <iframe name="my_frame" src="home.html"></iframe>
        </div>
    </div>

</body>
</html>
